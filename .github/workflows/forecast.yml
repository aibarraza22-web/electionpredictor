name: Scheduled demo refresh
on:
  schedule: [{cron: '17 */6 * * *'}]
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -r requirements.txt && python scripts/seed_demo.py
