services:
  api:
    build: .
    ports: ["8000:8000"]
    environment:
      DATABASE_URL: postgresql://forecast:forecast@db:5432/forecast
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      FEC_API_KEY: ${FEC_API_KEY:-}
    depends_on:
      db: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/data-health')"]
      interval: 30s
      timeout: 5s
      retries: 3
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: forecast
      POSTGRES_PASSWORD: forecast
      POSTGRES_DB: forecast
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forecast"]
      interval: 5s
      timeout: 5s
      retries: 10
volumes:
  pgdata: {}
